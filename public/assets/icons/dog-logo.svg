  <circle cx="39.5" cy="46.5" r="1.5" fill="#fff"/>

  <!-- Right eye -->
  <circle cx="59" cy="48" r="4.5" fill="#000"/>
  <circle cx="57.5" cy="46.5" r="1.5" fill="#fff"/>

  <!-- Nose -->
